name: Tests

on:
  push:
  pull_request:

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: pip install pytest requests

      - name: Build Docker image
        run: docker build -t code-interpreter .

      - name: Start container
        run: |
          docker run -d --name code-interpreter -p 49999:49999 code-interpreter
          echo "Waiting for server..."
          timeout 60 bash -c 'until curl -sf http://localhost:49999/health; do sleep 1; done'

      - name: Run tests
        run: pytest tests/ -v

      - name: Print container logs on failure
        if: failure()
        run: docker logs code-interpreter
